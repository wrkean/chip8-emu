<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHIP-8 Emulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>CHIP-8</h1>
      <span class="sub">EMULATOR v1.0</span>
      <span id="status"></span>
      <div class="status-dot" id="status-dot"></div>
    </header>

    <div class="main">
      <div>
        <div class="screen-wrap">
          <span class="screen-label">DISPLAY · 64×32</span>
          <canvas id="screen" width="64" height="32"></canvas>
        </div>
      </div>

      <div class="panel">
        <!-- ROM loader -->
        <div class="section">
          <div class="section-title">ROM</div>
          <div class="drop-zone" id="drop-zone">
            <div class="icon">▤</div>
            <div>Drop .ch8 / .rom file<br />or click to browse</div>
            <input type="file" id="file-input" accept=".ch8,.rom,.bin,.c8" />
            <div id="rom-name"></div>
          </div>
        </div>

        <!-- Controls -->
        <div class="section">
          <div class="section-title">CONTROL</div>
          <div class="btn-row">
            <button class="primary" id="btn-run" disabled>▶ RUN</button>
            <button id="btn-pause" disabled>⏸ PAUSE</button>
          </div>
          <div class="btn-row" style="margin-top: 8px">
            <button id="btn-step" disabled>⏭ STEP</button>
            <button class="danger" id="btn-reset" disabled>↺ RESET</button>
          </div>
          <div class="slider-row" style="margin-top: 12px">
            <label>CPF</label>
            <input type="range" id="cpf-slider" min="1" max="50" value="15" />
            <span id="cpf-val">15</span>
          </div>
        </div>

        <div class="section">
          <div class="section-title">KEYPAD</div>
          <div class="keypad" id="keypad"></div>
        </div>

        <div class="section">
          <div class="section-title">DISPLAY</div>
          <div class="color-row">
            <div class="color-pick">
              <input type="color" id="color-on" value="#39ff14" />
              <span>ON</span>
            </div>
            <div class="color-pick">
              <input type="color" id="color-off" value="#000000" />
              <span>OFF</span>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">LOG</div>
          <div id="log"></div>
        </div>
      </div>
    </div>

    <footer>
      <span>CHIP-8 · HTML/JS FRONTEND</span>
      <span id="fps-display">-- FPS</span>
    </footer>
    <script type="module" src="chip8.js"></script>
  </body>
</html>
